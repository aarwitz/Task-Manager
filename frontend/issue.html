<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Manager - Issue</title>
    <link rel="stylesheet" href="/static/css/styles.css">
    <link rel="apple-touch-icon" sizes="180x180" href="/static/apple-touch-icon-180x180.png">
    <link rel="apple-touch-icon" sizes="167x167" href="/static/apple-touch-icon-167x167.png">
    <link rel="apple-touch-icon" sizes="152x152" href="/static/apple-touch-icon-152x152.png">
    <link rel="apple-touch-icon" sizes="120x120" href="/static/apple-touch-icon-120x120.png">
    <link rel="apple-touch-icon" href="/static/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/static/LatestAppIcon.png">
    <meta name="apple-mobile-web-app-title" content="Task Manager">
    <meta name="apple-mobile-web-app-capable" content="yes">
</head>
<body>
    <nav class="navbar">
        <div class="nav-content">
            <div class="nav-left">
                <h2>Task Manager</h2>
                <a href="/static/backlog.html" class="nav-link">Backlog</a>
                <a href="/static/sprint.html" class="nav-link">Sprint</a>
                <a href="/static/search.html" class="nav-link">Search</a>
            </div>
            <div class="nav-right">
                <span id="currentUser" class="username"></span>
                <button id="createIssueBtn" class="btn btn-primary">+ Create Issue</button>
                <button id="logoutBtn" class="btn btn-secondary">Logout</button>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="issue-detail">
            <div class="issue-header">
                <div style="flex: 1;">
                    <div class="issue-id-badge">
                        <span id="issueId"></span>
                    </div>
                    <div class="editable-section">
                        <h1 id="issueTitle"></h1>
                        <input type="text" id="issueTitleEdit" class="issue-title-edit" style="display: none;">
                        <div class="edit-controls" id="titleEditControls" style="display: none;">
                            <button class="btn btn-primary" id="saveTitleBtn">Save</button>
                            <button class="btn btn-secondary" id="cancelTitleBtn">Cancel</button>
                        </div>
                    </div>
                </div>
                <div class="issue-meta">
                    <button class="edit-btn" id="editTitleBtn">Edit Title</button>
                    <span class="status-badge" id="issueStatus"></span>
                </div>
            </div>

            <div class="issue-info">
                <div class="info-item">
                    <strong>Created:</strong>
                    <span id="issueCreated"></span>
                </div>
                <div class="info-item">
                    <strong>Created by:</strong>
                    <span id="issueCreatedBy"></span>
                </div>
                <div class="info-item">
                    <strong>Assigned to:</strong>
                    <span id="issueAssignedTo"></span>
                </div>
            </div>

            <div class="issue-section">
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <h3>Description</h3>
                    <button class="edit-btn" id="editDescriptionBtn">Edit</button>
                </div>
                <div id="issueDescription" class="issue-description"></div>
                <textarea id="issueDescriptionEdit" class="issue-description-edit" style="display: none;"></textarea>
                <div class="edit-controls" id="descriptionEditControls" style="display: none;">
                    <button class="btn btn-primary" id="saveDescriptionBtn">Save</button>
                    <button class="btn btn-secondary" id="cancelDescriptionBtn">Cancel</button>
                </div>
            </div>

            <div class="issue-section">
                <h3>Images</h3>
                <div id="issueImages" class="issue-images"></div>
                <div class="upload-section">
                    <div class="file-input-wrapper">
                        <input type="file" id="imageUpload" accept="image/*">
                        <label for="imageUpload" class="file-input-label">Choose Image</label>
                    </div>
                    <span class="file-name" id="fileName">No file chosen</span>
                    <button class="btn btn-primary" id="uploadImageBtn" style="display: none;">Upload</button>
                </div>
                <div class="upload-progress" id="uploadProgress"></div>
            </div>

            <div class="issue-section">
                <h3>Comments</h3>
                <div id="commentsList" class="comments-list"></div>
                
                <form id="addCommentForm" class="comment-form">
                    <textarea 
                        id="commentContent" 
                        placeholder="Add a comment..." 
                        rows="3"
                        required
                    ></textarea>
                    <div class="inline-upload-controls">
                        <div class="file-input-wrapper">
                            <input type="file" id="commentImageUpload" accept="image/*" multiple>
                            <label for="commentImageUpload" class="file-input-label">Add Comment Images</label>
                        </div>
                        <span class="file-name" id="commentFileName">No files selected</span>
                    </div>
                    <button type="submit" class="btn btn-primary">Submit Comment</button>
                </form>
            </div>
        </div>
    </div>

    <!-- Create Issue Modal -->
    <div id="createIssueModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Create Issue</h2>
                <span class="close">&times;</span>
            </div>
            <form id="createIssueForm">
                <div class="form-group">
                    <label for="newIssueTitle">Title *</label>
                    <input type="text" id="newIssueTitle" required>
                </div>
                <div class="form-group">
                    <label for="newIssueDescription">Description *</label>
                    <textarea id="newIssueDescription" rows="5" required></textarea>
                </div>
                <div class="form-group">
                    <label for="newIssueImages">Attach images (optional)</label>
                    <input type="file" id="newIssueImages" accept="image/*" multiple>
                    <small id="newIssueImagesLabel" class="file-name">No files selected</small>
                </div>
                <div class="form-group">
                    <label for="newIssueAssignedTo">Assign to</label>
                    <select id="newIssueAssignedTo">
                        <option value="">Unassigned</option>
                        <option value="Aaron">Aaron</option>
                        <option value="Claw">Claw</option>
                    </select>
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn btn-secondary cancel-btn">Cancel</button>
                    <button type="submit" class="btn btn-primary">Create Issue</button>
                </div>
            </form>
        </div>
    </div>

    <script src="/static/js/issue.js"></script>
</body>
</html>
