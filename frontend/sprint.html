<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Manager - Sprint</title>
    <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-content">
            <div class="nav-left">
                <h2>Task Manager</h2>
                <a href="/static/backlog.html" class="nav-link">Backlog</a>
                <a href="/static/sprint.html" class="nav-link active">Sprint</a>
            </div>
            <div class="nav-right">
                <span id="currentUser" class="username"></span>
                <button id="createIssueBtn" class="btn btn-primary">+ Create Issue</button>
                <button id="logoutBtn" class="btn btn-secondary">Logout</button>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="page-header">
            <div>
                <h1 id="sprintTitle">Sprint</h1>
                <p id="sprintInfo" class="sprint-info"></p>
            </div>
            <div class="sprint-actions">
                <button id="startSprintBtn" class="btn btn-success" style="display: none;">Start Sprint</button>
                <button id="endSprintBtn" class="btn btn-danger" style="display: none;">End Sprint</button>
            </div>
        </div>

        <div id="noSprintMessage" class="no-sprint-message" style="display: none;">
            <h3>No Active Sprint</h3>
            <p>Go to the <a href="/static/backlog.html">backlog</a> to create and start a sprint.</p>
        </div>

        <div id="sprintBoard" class="sprint-board">
            <div class="column" data-status="to_do">
                <div class="column-header">
                    <h3>To Do</h3>
                    <span class="issue-count">0</span>
                </div>
                <div class="column-content" data-status="to_do"></div>
            </div>

            <div class="column" data-status="in_progress">
                <div class="column-header">
                    <h3>In Progress</h3>
                    <span class="issue-count">0</span>
                </div>
                <div class="column-content" data-status="in_progress"></div>
            </div>

            <div class="column" data-status="in_review">
                <div class="column-header">
                    <h3>In Review</h3>
                    <span class="issue-count">0</span>
                </div>
                <div class="column-content" data-status="in_review"></div>
            </div>

            <div class="column" data-status="done">
                <div class="column-header">
                    <h3>Done</h3>
                    <span class="issue-count">0</span>
                </div>
                <div class="column-content" data-status="done"></div>
            </div>
        </div>
    </div>

    <!-- Create Issue Modal -->
    <div id="createIssueModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Create Issue</h2>
                <span class="close">&times;</span>
            </div>
            <form id="createIssueForm">
                <div class="form-group">
                    <label for="issueTitle">Title *</label>
                    <input type="text" id="issueTitle" required>
                </div>
                <div class="form-group">
                    <label for="issueDescription">Description *</label>
                    <textarea id="issueDescription" rows="5" required></textarea>
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn btn-secondary cancel-btn">Cancel</button>
                    <button type="submit" class="btn btn-primary">Create Issue</button>
                </div>
            </form>
        </div>
    </div>

    <script src="/static/js/sprint.js"></script>
</body>
</html>
